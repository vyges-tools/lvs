# Manual-trigger build & test. Promote to push/PR triggers at public launch.
name: ci

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: build & test (std-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # dep-mode: this engine depends on the shared vyges-tools/layout foundation via a
      # path dep (`../vyges-tools-layout`) for sibling-checkout dev. In CI we fetch the
      # foundation and repoint the path at it. (layout is public at launch -> anonymous
      # checkout; pre-launch add `token:` with a PAT that can read the private repo.)
      - name: Fetch the vyges-tools/layout foundation
        uses: actions/checkout@v4
        with:
          repository: vyges-tools/layout
          path: .deps/vyges-tools-layout
      - name: Repoint the path dependency at the CI checkout
        shell: bash
        run: sed -i.bak 's#\.\./vyges-tools-layout#.deps/vyges-tools-layout#' Cargo.toml && rm -f Cargo.toml.bak
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --locked --verbose
      - name: Test
        run: cargo test --locked --verbose
